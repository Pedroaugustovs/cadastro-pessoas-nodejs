<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Pessoas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="container mt-5">

<h3 class="text-center mb-4">Cadastro de Pessoas - NodeJS</h3>

<div class="card">

<div class="card-body">

<div class="d-flex justify-content-between mb-3">

<h5 class="m-0">Lista de Pessoas</h5>

<button class="btn btn-primary" onclick="novo()">Nova pessoa</button>

</div>

<div id="mensagem"></div>

<div id="formulario" class="mb-4" style="display:none">

<input type="hidden" id="txtid">

<div class="row">

<div class="col-md-4">
<label class="form-label">Nome</label>
<input type="text" id="txtnome" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Telefone</label>
<input type="text" id="txttelefone" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Email</label>
<input type="text" id="txtemail" class="form-control">
</div>

</div>

<div class="mt-3">

<button class="btn btn-success" onclick="salvar()">Salvar</button>

<button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>

</div>

</div>

<div id="conteudo"></div>

</div>

</div>

</div>

<script src="index.js"></script>

</body>
</html>
